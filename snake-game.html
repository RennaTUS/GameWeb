<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Rắn Săn Mồi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            color: #4ecca3;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .score-board {
            display: flex;
            justify-content: space-between;
            width: 400px;
            margin-bottom: 10px;
            color: #fff;
            font-size: 18px;
        }

        #gameCanvas {
            border: 3px solid #4ecca3;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(78, 204, 163, 0.3);
            background-color: #0f0f23;
        }

        .controls {
            margin-top: 15px;
            color: #aaa;
            font-size: 14px;
        }

        .btn {
            padding: 10px 30px;
            font-size: 18px;
            background-color: #4ecca3;
            color: #1a1a2e;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: #45b392;
            transform: scale(1.05);
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }

        .game-over h2 {
            color: #e74c3c;
            font-size: 36px;
            margin-bottom: 20px;
        }

        .game-over p {
            color: #fff;
            font-size: 24px;
            margin-bottom: 15px;
        }

        .btn-back {
            padding: 10px 30px;
            font-size: 16px;
            background-color: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background-color: #c0392b;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>Rắn Săn Mồi 🐍</h1>
        <div class="score-board">
            <span>Điểm: <span id="score">0</span></span>
            <span>Cao nhất: <span id="highScore">0</span></span>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <p class="controls">Dùng phím mũi tên ⬆️⬇️⬅️➡️ để điều khiển</p>
        <button class="btn" onclick="startGame()">Bắt Đầu Game</button>

        <div id="gameOverScreen" class="game-over">
            <h2>GAME OVER!</h2>
            <p>Điểm của bạn: <span id="finalScore">0</span></p>
            <button class="btn" onclick="startGame()">Chơi Lại</button>
            <br><br>
            <a href="index.html" class="btn-back">🏠 Quay lại Trang Chủ</a>
        </div>
    </div>

    <script>
        // Polyfill for roundRect to support older or non-standard browsers
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                if (typeof r === 'number') {
                    r = [r];
                }
                if (r.length === 1) {
                    r = [r[0], r[0], r[0], r[0]];
                }
                this.beginPath();
                this.moveTo(x + r[0], y);
                this.lineTo(x + w - r[1], y);
                this.quadraticCurveTo(x + w, y, x + w, y + r[1]);
                this.lineTo(x + w, y + h - r[2]);
                this.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
                this.lineTo(x + r[3], y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r[3]);
                this.lineTo(x, y + r[0]);
                this.quadraticCurveTo(x, y, x + r[0], y);
                this.closePath();
                return this;
            };
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreElement = document.getElementById('finalScore');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [
            { x: 10, y: 10 },
            { x: 9, y: 10 },
            { x: 8, y: 10 }
        ];
        let food = { x: 5, y: 5 };
        let direction = 'right';
        let nextDirection = 'right';
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let gameSpeed = 150;

        highScoreElement.textContent = highScore;

        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };

            // Đảm bảo thức ăn không xuất hiện trên rắn
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    return spawnFood();
                }
            }
        }

        function drawGame() {
            // Xóa canvas
            ctx.fillStyle = '#0f0f23';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Vẽ rắn
            snake.forEach((segment, index) => {
                const gradient = ctx.createRadialGradient(
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    0,
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    gridSize / 2
                );

                if (index === 0) {
                    // Đầu rắn - màu sáng hơn
                    gradient.addColorStop(0, '#6effc4');
                    gradient.addColorStop(1, '#4ecca3');
                } else {
                    // Thân rắn - màu xanh lá
                    gradient.addColorStop(0, '#4ecca3');
                    gradient.addColorStop(1, '#3db892');
                }

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2,
                    5
                );
                ctx.fill();

                // Vẽ mắt cho đầu rắn
                if (index === 0) {
                    ctx.fillStyle = '#fff';
                    const eyeOffset = gridSize / 4;
                    const eyeSize = 3;

                    if (direction === 'right') {
                        ctx.fillRect(segment.x * gridSize + 12, segment.y * gridSize + 5, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + 12, segment.y * gridSize + 12, eyeSize, eyeSize);
                    } else if (direction === 'left') {
                        ctx.fillRect(segment.x * gridSize + 5, segment.y * gridSize + 5, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + 5, segment.y * gridSize + 12, eyeSize, eyeSize);
                    } else if (direction === 'up') {
                        ctx.fillRect(segment.x * gridSize + 5, segment.y * gridSize + 5, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + 12, segment.y * gridSize + 5, eyeSize, eyeSize);
                    } else {
                        ctx.fillRect(segment.x * gridSize + 5, segment.y * gridSize + 12, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + 12, segment.y * gridSize + 12, eyeSize, eyeSize);
                    }
                }
            });

            // Vẽ thức ăn
            const foodGradient = ctx.createRadialGradient(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                0,
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2
            );
            foodGradient.addColorStop(0, '#ff6b6b');
            foodGradient.addColorStop(1, '#ee5a5a');

            ctx.fillStyle = foodGradient;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();

            // Vẽ lưới nền
            ctx.strokeStyle = 'rgba(78, 204, 163, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
        }

        function updateGame() {
            direction = nextDirection;

            // Tính toán vị trí mới của đầu rắn
            const head = { ...snake[0] };

            switch (direction) {
                case 'up': head.y--; break;
                case 'down': head.y++; break;
                case 'left': head.x--; break;
                case 'right': head.x++; break;
            }

            // Kiểm tra va chạm với tường
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // Kiểm tra va chạm với thân rắn
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }

            // Thêm đầu mới vào mảng rắn
            snake.unshift(head);

            // Kiểm tra ăn thức ăn
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;

                // Tăng tốc độ game mỗi khi ăn được 50 điểm
                if (score % 50 === 0 && gameSpeed > 50) {
                    gameSpeed -= 10;
                }

                spawnFood();
            } else {
                snake.pop();
            }

            drawGame();
        }

        function gameOver() {
            clearInterval(gameLoop);
            finalScoreElement.textContent = score;
            gameOverScreen.style.display = 'block';

            // Cập nhật điểm cao nhất
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreElement.textContent = highScore;
            }
        }

        function startGame() {
            gameOverScreen.style.display = 'none';
            
            // Khởi tạo rắn ở giữa màn hình
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];

            direction = 'right';
            nextDirection = 'right';
            score = 0;
            gameSpeed = 150;
            
            scoreElement.textContent = score;
            spawnFood();
            drawGame();

            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(updateGame, gameSpeed);
        }

        // Xử lý phím mũi tên
        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp':
                    if (direction !== 'down') nextDirection = 'up';
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    if (direction !== 'up') nextDirection = 'down';
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                    if (direction !== 'right') nextDirection = 'left';
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    if (direction !== 'left') nextDirection = 'right';
                    e.preventDefault();
                    break;
            }
        });

        // Vẽ màn hình ban đầu
        drawGame();
    </script>
</body>
</html>
